<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mars Workbench — Login</title>
<style>
  /*
   * mars-dark theme tokens (mirrors globals.css)
   *
   * Implementation mapping:
   *   --base-300  → bg-base-300
   *   --base-100  → bg-base-100
   *   --base-content → text-base-content
   *   --primary   → text-primary, from-primary
   *   --secondary → text-secondary, to-secondary
   *   --neutral   → bg-neutral
   */
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=Outfit:wght@300;600;700&display=swap');

  :root {
    --base-100: #141428;
    --base-200: #0e0e1e;
    --base-300: #08081a;
    --base-content: #e0e0ec;
    --primary: #00d4f0;
    --secondary: #a855f7;
    --accent: #f43f5e;
    --neutral: #1a1a34;
  }

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', system-ui, sans-serif;
    background: var(--base-300);
    color: var(--base-content);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* ── atmospheric background ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 50% at 50% 100%, rgba(0, 212, 240, 0.06) 0%, transparent 70%),
      radial-gradient(ellipse 40% 40% at 20% 20%, rgba(168, 85, 247, 0.04) 0%, transparent 60%),
      radial-gradient(ellipse 50% 50% at 80% 30%, rgba(244, 63, 94, 0.03) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  /* ── subtle grid ── */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(224, 224, 236, 0.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(224, 224, 236, 0.02) 1px, transparent 1px);
    background-size: 64px 64px;
    pointer-events: none;
    z-index: 0;
  }

  /* ── card ── */
  .login-card {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 400px;
    padding: 48px 40px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 40px;
  }

  /* ── brand ── */
  .brand {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }

  .brand-icon {
    width: 56px;
    height: 56px;
    border-radius: 16px;
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow:
      0 0 40px rgba(0, 212, 240, 0.15),
      0 0 80px rgba(168, 85, 247, 0.08);
    animation: glow 4s ease-in-out infinite alternate;
  }

  @keyframes glow {
    0%   { box-shadow: 0 0 40px rgba(0, 212, 240, 0.15), 0 0 80px rgba(168, 85, 247, 0.08); }
    100% { box-shadow: 0 0 50px rgba(0, 212, 240, 0.22), 0 0 100px rgba(168, 85, 247, 0.12); }
  }

  .brand-icon svg {
    width: 28px;
    height: 28px;
    stroke: white;
    fill: none;
    stroke-width: 1.5;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .brand-name {
    font-family: 'Outfit', sans-serif;
    font-weight: 700;
    font-size: 26px;
    letter-spacing: -0.5px;
    color: var(--base-content);
  }

  .brand-name span {
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .brand-tagline {
    font-family: 'Outfit', sans-serif;
    font-weight: 300;
    font-size: 15px;
    color: rgba(224, 224, 236, 0.45);
    letter-spacing: 0.3px;
  }

  /* ── divider ── */
  .divider-line {
    width: 100%;
    height: 1px;
    background: linear-gradient(
      90deg,
      transparent 0%,
      rgba(224, 224, 236, 0.08) 30%,
      rgba(224, 224, 236, 0.08) 70%,
      transparent 100%
    );
  }

  /* ── sign-in body ── */
  .login-body {
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
  }

  /* ── google button ── */
  .google-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    width: 100%;
    padding: 14px 24px;
    border: 1px solid rgba(224, 224, 236, 0.1);
    border-radius: 12px;
    background: var(--neutral);
    color: var(--base-content);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s ease;
    position: relative;
    overflow: hidden;
  }

  .google-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 12px;
    background: linear-gradient(135deg, rgba(0, 212, 240, 0.05), rgba(168, 85, 247, 0.05));
    opacity: 0;
    transition: opacity 0.2s ease;
  }

  .google-btn:hover {
    border-color: rgba(0, 212, 240, 0.25);
    transform: translateY(-1px);
    box-shadow: 0 4px 24px rgba(0, 0, 0, 0.3);
  }

  .google-btn:hover::before { opacity: 1; }
  .google-btn:active { transform: translateY(0); }

  .google-btn svg,
  .google-btn span {
    position: relative;
    z-index: 1;
  }

  .google-btn svg {
    width: 20px;
    height: 20px;
    flex-shrink: 0;
  }

  /* ── footer ── */
  .login-footer {
    font-size: 12px;
    color: rgba(224, 224, 236, 0.25);
    text-align: center;
    line-height: 1.6;
    letter-spacing: 0.2px;
  }

  /* ── fade-in animation ── */
  .login-card > * {
    opacity: 0;
    transform: translateY(12px);
    animation: fadeUp 0.6s ease forwards;
  }
  .login-card > *:nth-child(1) { animation-delay: 0.1s; }
  .login-card > *:nth-child(2) { animation-delay: 0.25s; }
  .login-card > *:nth-child(3) { animation-delay: 0.4s; }

  @keyframes fadeUp {
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<div class="login-card">
  <div class="brand">
    <div class="brand-icon">
      <svg viewBox="0 0 24 24">
        <path d="M12 2L2 7l10 5 10-5-10-5z" />
        <path d="M2 17l10 5 10-5" />
        <path d="M2 12l10 5 10-5" />
      </svg>
    </div>
    <div class="brand-name"><span>Mars</span> Workbench</div>
    <div class="brand-tagline">Plan. Focus. Ship.</div>
  </div>

  <div class="login-body">
    <div class="divider-line"></div>
    <button class="google-btn" onclick="alert('Redirect to Google OAuth')">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18A10.96 10.96 0 001 12c0 1.77.42 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      <span>Sign in with Google</span>
    </button>
  </div>

  <div class="login-footer">
    By signing in you agree to our terms of use.
  </div>
</div>

</body>
</html>
